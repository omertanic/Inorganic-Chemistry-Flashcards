<title>Org Ch2 — Alcohols, Ethers & Phenols · JEE Advanced</title>
<link rel="stylesheet" href="style.css">
<style>
  body { padding: 1rem; }
  .page-header {
    position: relative; display: flex; align-items: center;
    justify-content: center; margin-bottom: 2px;
  }
  h1 { font-size: 16px; font-weight: 600; color: var(--text); text-align: center; }
  .subtitle { font-size: 12px; color: var(--subtext); text-align: center; margin-bottom: 0.75rem; }
  .top-bar { display: flex; align-items: center; gap: 10px; margin-bottom: 0.75rem; }
  .filter-row { flex-direction: column; align-items: center; gap: 0; }

  /* organic green palette for category badges */
  .c-org-prep { background:#EAF6EE; color:#1a6b3a; }
  .c-org-rxn  { background:#FFF4E0; color:#7a4b00; }
  .c-org-ph   { background:#F0EAFF; color:#4a2080; }
  .c-org-eth  { background:#E0F4FF; color:#0a4a7a; }
  body.dark .c-org-prep { background:#0a2218; color:#50d090; }
  body.dark .c-org-rxn  { background:#221400; color:#e0a050; }
  body.dark .c-org-ph   { background:#18082a; color:#b080f0; }
  body.dark .c-org-eth  { background:#081828; color:#60b8e8; }

  .clear-btn {
    font-size: 11px; color: var(--subtext); background: none; border: none;
    cursor: pointer; text-decoration: underline; display: block;
    margin: 6px auto 0; padding: 0;
  }
  #done-saved { font-size: 11px; color: var(--subtext); margin-top: 8px; display: block; }

<body>

<div class="page-header">
  <a href="index2.html" class="back-link">← Organic chapters</a>
  <h1>Alcohols, Ethers &amp; Phenols</h1>
  <button class="dark-toggle" onclick="toggleDark()" id="dark-btn">🌙</button>
</div>
<p class="subtitle">Organic Chemistry Ch 2 — JEE Advanced 2026</p>

<div class="filter-row" id="filters"></div>

<div class="score-row">
  <span class="pill p-got"  id="s-got">Got: 0</span>
  <span class="pill p-nope" id="s-nope">Practice: 0</span>
  <span class="pill p-left" id="s-left">Left: 0</span>
</div>

<div class="top-bar">
  <div class="progress-bar"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
  <div class="prog-text" id="prog-text">1 / ?</div>
</div>

<div class="card-area">
  <div class="card-wrap" onclick="flip()">
    <div class="card-inner" id="card-inner">
      <div class="face front">
        <div class="cat-badge" id="f-cat"></div>
        <div class="face-tag">Reaction / Concept</div>
        <div class="face-main" id="f-main"></div>
        <div class="face-sub"  id="f-sub"></div>
        <div class="face-hint">Tap to reveal →</div>
      </div>
      <div class="face back">
        <div class="face-tag">Answer / Mechanism</div>
        <div class="face-main" id="b-main"></div>
        <div class="face-sub"  id="b-sub"></div>
        <div class="face-note" id="b-note"></div>
      </div>
    </div>
  </div>
</div>

<button class="btn-flip" id="flip-btn" onclick="flip()">Reveal answer</button>
<div class="btn-row" id="btn-row" style="display:none;">
  <button class="btn btn-nope" onclick="next(false)">Need practice</button>
  <button class="btn btn-got"  onclick="next(true)">Got it</button>
</div>

<div class="done-screen" id="done" style="display:none;">
  <h2 id="done-title"></h2>
  <p  id="done-sub"></p>
  <span id="done-saved"></span>
  <button class="restart-btn" onclick="restart()">Restart deck</button>
  <button class="restart-btn" onclick="practiceMissed()" id="practice-missed" style="display:none;margin-top:8px;">🔁 Practice missed</button>
  <button class="clear-btn" onclick="clearAndRestart()">Clear saved progress</button>
</div>

<script src="cards-org-ch2.js"></script>
<script src="engine.js"></script>
<script>
  function clearAndRestart() {
    restart();
  }
  initDeck();
</script>
</body>
</html>
